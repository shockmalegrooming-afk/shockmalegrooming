  .phero p{color:rgba(240,236,229,.5);max-width:520px;margin:16px auto 0;font-size:.98rem;line-height:1.5}

  .card:hover .thumb img{transform:scale(1.05)}
  .card .tag{position:absolute;top:12px;left:12px;background:#c9a84c;color:#0a0908;font-size:.62rem;font-weight:800;padding:4px 10px;border-radius:100px;letter-spacing:.04em;text-transform:uppercase}

  .card .ptype{color:rgba(240,236,229,.35);font-size:.72rem;margin:0 0 12px}
  .card .row{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card .price{font-weight:700;font-size:1.02rem}
  .card .price .was{color:rgba(240,236,229,.3);font-weight:400;font-size:.82rem;text-decoration:line-through;margin-right:6px}
  .add{background:#c9a84c;color:#0a0908;border:none;border-radius:100px;width:38px;height:38px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;font-family:var(--font-b,sans-serif)}
  .add:hover{background:#dcbb5e}
  .add:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);cursor:not-allowed}
  .skel{background:#141312;border-radius:16px;aspect-ratio:.78;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:.9}}
  .empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(240,236,229,.4)}
  footer.sf{border-top:1px solid rgba(255,255,255,.06);padding:34px 0;text-align:center;color:rgba(240,236,229,.3);font-size:.78rem}
  footer.sf a{color:rgba(240,236,229,.5);text-decoration:none;margin:0 10px}
  @media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr);gap:14px}.wrap,.sh-in{padding-left:18px;padding-right:18px}.sh-nav{gap:16px}.sh-nav a.lnk{display:none}}
  @media(max-width:420px){.grid{grid-template-columns:repeat(2,1fr);gap:11px}.card .body{padding:12px}}

<body>
<header class="sh">
  <div class="sh-in">

<main>

  </section>

      <span class="count" id="count"></span>
      <div class="filters" id="filters"></div>
    </div>
    <div class="grid" id="grid">
      <div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>

  <div>© <span id="yr"></span> SHOCK Male Grooming · Cinerarius</div>

<script src="/shock-content.js?v=3"></script>
<script src="/shock-shop.js?v=3"></script>
<script>
(function(){
  document.getElementById("yr").textContent=new Date().getFullYear();
  var money=window.ShockShop.money;
  var grid=document.getElementById("grid"),countEl=document.getElementById("count"),filtersEl=document.getElementById("filters");
  var all=[],activeType="Tutti";

  var Q="{products(first:100,sortKey:BEST_SELLING){edges{node{"+
    "id handle title productType availableForSale totalInventory "+
    "featuredImage{url altText} "+
    "images(first:1){edges{node{url}}} "+
    "priceRange{minVariantPrice{amount currencyCode}} "+
    "compareAtPriceRange{minVariantPrice{amount currencyCode}} "+
    "variants(first:1){edges{node{id availableForSale}}}"+
    "}}}}";

  function card(p){
    var img=(p.featuredImage&&p.featuredImage.url)||(p.images.edges[0]&&p.images.edges[0].node.url)||"";
    var price=p.priceRange.minVariantPrice;
    var cmp=p.compareAtPriceRange&&p.compareAtPriceRange.minVariantPrice;
    var onSale=cmp&&parseFloat(cmp.amount)>parseFloat(price.amount);
    var variant=p.variants.edges[0]&&p.variants.edges[0].node;
    var avail=p.availableForSale&&variant&&variant.availableForSale;
    var badge=onSale?'<span class="tag">Offerta</span>':(!avail?'<span class="sold">Esaurito</span>':'');
    var a=document.createElement("a");
    a.className="card";a.href="/prodotto?handle="+encodeURIComponent(p.handle);
    a.innerHTML=
      '<div class="thumb">'+badge+(img?'<img src="'+img+'" alt="'+(p.featuredImage&&p.featuredImage.altText||p.title)+'" loading="lazy">':'')+'</div>'+
      '<div class="body">'+
        '<h3>'+p.title+'</h3>'+
        (function(){var c=window.ShockContent&&window.ShockContent[p.handle];var t=(c&&c.tagline)||p.productType||"";return '<p class="ptype">'+t+'</p>';})()+
        '<div class="row">'+
          '<div class="price">'+(onSale?'<span class="was">'+money(cmp.amount,cmp.currencyCode)+'</span>':'')+money(price.amount,price.currencyCode)+'</div>'+
          '<button class="add" '+(avail?'':'disabled')+' aria-label="Aggiungi al carrello">+</button>'+
        '</div>'+
      '</div>';
    var btn=a.querySelector(".add");
    btn.addEventListener("click",function(ev){
      ev.preventDefault();ev.stopPropagation();
      if(!avail||!variant)return;
      btn.disabled=true;btn.textContent="✓";
      window.ShockShop.addAndOpen(variant.id,1).finally(function(){setTimeout(function(){btn.disabled=false;btn.textContent="+";},900);});
    });
    return a;
  }

  function renderFilters(){
    var types=["Tutti"].concat(Array.from(new Set(all.map(function(p){return p.productType;}).filter(Boolean))));
    if(types.length<=2){filtersEl.innerHTML="";return;}
    filtersEl.innerHTML="";
    types.forEach(function(t){
      var b=document.createElement("button");
      b.className="chip"+(t===activeType?" on":"");b.textContent=t;
      b.addEventListener("click",function(){activeType=t;renderFilters();renderGrid();});
      filtersEl.appendChild(b);
    });
  }
  function renderGrid(){
    var list=activeType==="Tutti"?all:all.filter(function(p){return p.productType===activeType;});
    grid.innerHTML="";
    if(!list.length){grid.innerHTML='<div class="empty">Nessun prodotto disponibile al momento.</div>';countEl.textContent="";return;}
    list.forEach(function(p){grid.appendChild(card(p));});
    countEl.textContent=list.length+(list.length===1?" prodotto":" prodotti");
  }

  window.ShockShop.sfetch(Q).then(function(d){
    all=(d.products.edges||[]).map(function(e){return e.node;});
    renderFilters();renderGrid();
  }).catch(function(err){
    grid.innerHTML='<div class="empty">Impossibile caricare i prodotti.<br><span style="font-size:.75rem;opacity:.6">'+(err.message||"")+'</span></div>';
  });
})();
</script>
</body>
