<script>
(function(){
  document.getElementById("yr").textContent=new Date().getFullYear();
  var money=window.ShockShop.money, main=document.getElementById("main"), revEl=document.getElementById("reviews");
  var params=new URLSearchParams(location.search), handle=params.get("handle");
  if(!handle){main.innerHTML='<div class="loadwrap">Prodotto non trovato. <a href="/prodotti" style="color:#c9a84c">Vedi tutti i prodotti</a></div>';return;}

  var Q="query($handle:String!){product(handle:$handle){"+
    "id handle title descriptionHtml productType availableForSale "+
    "featuredImage{url altText} images(first:12){edges{node{url altText}}} "+
    "options{name values} "+
    "priceRange{minVariantPrice{amount currencyCode}} "+
    "compareAtPriceRange{minVariantPrice{amount currencyCode}} "+
    "variants(first:100){edges{node{id title availableForSale quantityAvailable selectedOptions{name value} price{amount currencyCode} compareAtPrice{amount currencyCode} image{url}}}}"+
    "}}";

  // recensioni segnaposto stabili per handle
  function seeded(h){var s=0;for(var i=0;i<h.length;i++)s=(s*31+h.charCodeAt(i))>>>0;return function(){s=(s*1103515245+12345)>>>0;return s/4294967295;};}
  var NAMES=["Marco R.","Luca B.","Andrea F.","Giovanni P.","Matteo S.","Davide C.","Simone T.","Francesco G.","Alessandro M.","Riccardo V."];
  var TXT=["Prodotto top, tenuta perfetta per tutto il giorno.","Profumo fantastico e finish naturale. Lo ricompro.","Qualità da salone, si sente la differenza.","Arrivato velocissimo, risultato eccellente.","Il migliore che abbia provato finora.","Ottimo rapporto qualità-prezzo, consigliatissimo.","Uso quotidiano, la mia barba non è mai stata meglio.","Effetto professionale anche a casa. Promosso."];
  function reviews(h){
    var r=seeded(h),n=4+Math.floor(r()*3),out=[];
    var used={};
    for(var i=0;i<n;i++){
      var ni;do{ni=Math.floor(r()*NAMES.length);}while(used[ni]&&Object.keys(used).length<NAMES.length);used[ni]=1;
      out.push({who:NAMES[ni],stars:r()>0.25?5:4,txt:TXT[Math.floor(r()*TXT.length)]});
    }
    var avg=(out.reduce(function(a,b){return a+b.stars;},0)/out.length);
    return {list:out,avg:avg,count:18+Math.floor(r()*40)};
  }
  function starStr(n){return "★★★★★".slice(0,n)+"☆☆☆☆☆".slice(0,5-n);}

  window.ShockShop.sfetch(Q,{handle:handle}).then(function(d){
    var p=d.product;
    if(!p){main.innerHTML='<div class="loadwrap">Prodotto non trovato. <a href="/prodotti" style="color:#c9a84c">Vedi tutti i prodotti</a></div>';return;}
    render(p);
  }).catch(function(err){
    main.innerHTML='<div class="loadwrap">Errore nel caricamento.<br><span style="opacity:.6;font-size:.75rem">'+(err.message||"")+'</span></div>';
  });

  function render(p){
    document.title=p.title+" — SHOCK Male Grooming";
    var imgs=p.images.edges.map(function(e){return e.node;});
    if(!imgs.length&&p.featuredImage)imgs=[p.featuredImage];
    var variants=p.variants.edges.map(function(e){return e.node;});
    var hasOptions=!(p.options.length===1&&p.options[0].name==="Title"&&p.options[0].values.length===1&&p.options[0].values[0]==="Default Title");
    var sel={}; p.options.forEach(function(o){sel[o.name]=o.values[0];});
    var rv=reviews(p.handle);
    var cont=(window.ShockContent&&window.ShockContent[p.handle])||null;
    var descHtml=(cont&&cont.html)||p.descriptionHtml||"";
    var topLabel=(cont&&cont.tagline)||p.productType||"";

    function currentVariant(){
      return variants.find(function(v){return v.selectedOptions.every(function(so){return sel[so.name]===so.value;});})||variants[0];
    }
    function variantAvailable(optName,optVal){
      // c'è almeno una variante disponibile con questa combinazione parziale?
      var test={};for(var k in sel)test[k]=sel[k];test[optName]=optVal;
      return variants.some(function(v){return v.availableForSale&&v.selectedOptions.every(function(so){return test[so.name]===so.value;});});
    }

    main.innerHTML=
      '<div class="wrap"><div class="pd">'+
        '<div class="gal-sticky">'+
          '<div class="gal-main"><img id="galmain" src="'+(imgs[0]?imgs[0].url:"")+'" alt="'+(p.title)+'"></div>'+
          (imgs.length>1?'<div class="gal-thumbs" id="thumbs"></div>':'')+
        '</div>'+
        '<div class="info">'+
          (topLabel?'<p class="ptype">'+topLabel+'</p>':'')+
          '<h1>'+p.title+'</h1>'+
          '<div class="rate"><span class="stars">'+starStr(Math.round(rv.avg))+'</span><span>'+rv.avg.toFixed(1)+' · '+rv.count+' recensioni</span></div>'+
          '<div class="price" id="price"></div>'+
          '<div id="opts"></div>'+
          '<div class="stock" id="stock"></div>'+
          '<div class="buybar">'+
            '<div class="qty"><button id="qminus">−</button><span id="qval">1</span><button id="qplus">+</button></div>'+
            '<button class="buy" id="buy">Aggiungi al carrello</button>'+
          '</div>'+
          '<button class="scrollcue" id="scrollcue"><span class="arr">↓</span> Scorri per descrizione e recensioni</button>'+
          '<div class="desc">'+descHtml+'</div>'+
          '<div class="perks">'+
            '<div><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Formule professionali made in Italy</div>'+
            '<div><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>Spedizione in 3-5 giorni lavorativi</div>'+
            '<div><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V5z"/></svg>Pagamenti sicuri · checkout protetto Shopify</div>'+
          '</div>'+
        '</div>'+
      '</div></div>';

    var qty=1;
    var qval=document.getElementById("qval");
    document.getElementById("qminus").onclick=function(){if(qty>1){qty--;qval.textContent=qty;}};
    document.getElementById("qplus").onclick=function(){qty++;qval.textContent=qty;};
    var sc=document.getElementById("scrollcue");
    if(sc)sc.onclick=function(){revEl.scrollIntoView({behavior:"smooth",block:"start"});};

    // thumbnails
    if(imgs.length>1){
      var tw=document.getElementById("thumbs");
      imgs.forEach(function(im,i){
        var b=document.createElement("button");if(i===0)b.className="on";
        b.innerHTML='<img src="'+im.url+'" alt="">';
        b.onclick=function(){document.getElementById("galmain").src=im.url;tw.querySelectorAll("button").forEach(function(x){x.className="";});b.className="on";};
        tw.appendChild(b);
      });
    }

    function refresh(){
      var v=currentVariant();
      // prezzo
      var pr=v.price, cmp=v.compareAtPrice;
      var onSale=cmp&&parseFloat(cmp.amount)>parseFloat(pr.amount);
      var off=onSale?Math.round((1-parseFloat(pr.amount)/parseFloat(cmp.amount))*100):0;
      document.getElementById("price").innerHTML=
        '<span class="now">'+money(pr.amount,pr.currencyCode)+'</span>'+
        (onSale?'<span class="was">'+money(cmp.amount,cmp.currencyCode)+'</span><span class="off">-'+off+'%</span>':'');
      // immagine variante
      if(v.image&&v.image.url){document.getElementById("galmain").src=v.image.url;}
      // stock
      var st=document.getElementById("stock");
      if(!v.availableForSale){st.className="stock no";st.textContent="Non disponibile";}
      else if(v.quantityAvailable!=null&&v.quantityAvailable>0&&v.quantityAvailable<=5){st.className="stock low";st.textContent="Solo "+v.quantityAvailable+" rimasti in magazzino";}
      else{st.className="stock ok";st.textContent="Disponibile · pronto per la spedizione";}
      // buy button
      var buy=document.getElementById("buy");
      buy.disabled=!v.availableForSale;
      buy.textContent=v.availableForSale?"Aggiungi al carrello":"Esaurito";
      buy.onclick=function(){
        if(!v.availableForSale)return;
        buy.disabled=true;buy.textContent="Aggiunto ✓";
        window.ShockShop.addAndOpen(v.id,qty).finally(function(){setTimeout(function(){buy.disabled=false;buy.textContent="Aggiungi al carrello";},1000);});
      };
    }

    // opzioni
    if(hasOptions){
      var oc=document.getElementById("opts");
      oc.innerHTML=p.options.map(function(o){
        return '<div class="opt"><div class="opt-label">'+o.name+'</div><div class="opt-vals" data-opt="'+o.name+'">'+
          o.values.map(function(val){return '<button data-val="'+val.replace(/"/g,"&quot;")+'">'+val+'</button>';}).join("")+
          '</div></div>';
      }).join("");
      oc.querySelectorAll(".opt-vals").forEach(function(row){
        var oname=row.getAttribute("data-opt");
        function paint(){
          row.querySelectorAll("button").forEach(function(b){
            var val=b.getAttribute("data-val");
            b.className=(sel[oname]===val?"on":"")+(variantAvailable(oname,val)?"":" dis");
          });
        }
        row.querySelectorAll("button").forEach(function(b){
          b.onclick=function(){sel[oname]=b.getAttribute("data-val");oc.querySelectorAll(".opt-vals").forEach(function(r){});paint();refresh();
            // ridipingi tutte le righe (disponibilità dipende dalle altre scelte)
            oc.querySelectorAll(".opt-vals").forEach(function(r){var on=r.getAttribute("data-opt");r.querySelectorAll("button").forEach(function(bb){var vv=bb.getAttribute("data-val");bb.className=(sel[on]===vv?"on":"")+(variantAvailable(on,vv)?"":" dis");});});
          };
        });
        paint();
      });
    }
    refresh();

    // recensioni
    revEl.style.display="block";
    revEl.innerHTML=
      '<h2>Recensioni</h2>'+
      '<div class="rev-sum"><span class="stars" style="color:#c9a84c;font-size:1.1rem">'+starStr(Math.round(rv.avg))+'</span> <strong style="color:#f0ece5">'+rv.avg.toFixed(1)+'</strong> su 5 · basato su '+rv.count+' recensioni</div>'+
      '<div class="rev-grid">'+rv.list.map(function(r){
        return '<div class="rev"><div class="top"><span class="who">'+r.who+'</span><span class="ver">✓ Acquisto verificato</span></div>'+
          '<div class="stars" style="color:#c9a84c">'+starStr(r.stars)+'</div><p>'+r.txt+'</p></div>';
      }).join("")+'</div>'+
      '<p class="placeholder-note">Recensioni dimostrative — presto collegheremo le recensioni reali dei clienti.</p>';
  }
})();
</script>
</body>
</html>
