<script>
(function(){
  var SURL="https://shock-male-grooming.myshopify.com/api/2024-01/graphql.json";
  var STOKEN="0a215f25881fcbcbd0a0a7d8405b7ff6";
  var form=document.getElementById("form"),btn=document.getElementById("btn"),msgEl=document.getElementById("msg"),pw=document.getElementById("pw"),pw2=document.getElementById("pw2");
  function show(kind,text){msgEl.innerHTML='<div class="msg '+kind+'">'+text+'</div>';}
  function gql(query,variables){return fetch(SURL,{method:"POST",headers:{"Content-Type":"application/json","X-Shopify-Storefront-Access-Token":STOKEN},body:JSON.stringify({query:query,variables:variables})}).then(function(r){return r.json();});}

  var params=new URLSearchParams(location.search);
  var rurl=params.get("rurl")||params.get("url")||"";
  try{ if(rurl && rurl.indexOf("http")!==0){ rurl=decodeURIComponent(rurl); } }catch(e){}
  // Shopify a volte passa l'url già come parametri separati (reset_url) — supportiamo anche il link nativo
  if(!rurl && params.get("id") && params.get("token")){
    rurl="https://shock-male-grooming.myshopify.com/account/reset/"+params.get("id")+"/"+params.get("token");
  }
  if(!rurl){
    form.style.display="none";
    show("err","Link non valido o scaduto. Richiedi un nuovo link dalla pagina <a href=\"/recupera-password\" style=\"color:#c9a84c\">Recupera password</a>.");
  }

  form.addEventListener("submit",function(e){
    e.preventDefault();
    var p1=pw.value||"",p2=pw2.value||"";
    if(p1.length<5){show("err","La password deve avere almeno 5 caratteri.");return;}
    if(p1!==p2){show("err","Le due password non coincidono.");return;}
    btn.disabled=true;btn.textContent="Reimposto...";msgEl.innerHTML="";
    gql("mutation reset($u:URL!,$p:String!){customerResetByUrl(resetUrl:$u,password:$p){customer{id email firstName}customerAccessToken{accessToken}customerUserErrors{message}}}",{u:rurl,p:p1})
    .then(function(j){
      if(j.errors&&j.errors.length)throw new Error("Il link non è più valido. Richiedine uno nuovo.");
      var res=j.data&&j.data.customerResetByUrl;
      if(res&&res.customerUserErrors&&res.customerUserErrors.length)throw new Error(res.customerUserErrors[0].message);
      var tok=res&&res.customerAccessToken&&res.customerAccessToken.accessToken;
      var cust=res&&res.customer;
      try{
        if(tok){localStorage.setItem("shopify_token",tok);}
        if(cust&&cust.email){localStorage.setItem("shopify_email",cust.email);}
        if(cust&&cust.firstName){localStorage.setItem("shopify_name",cust.firstName);}
      }catch(e){}
      show("ok","✅ Password aggiornata! Ti stiamo portando al sito, sei già connesso.");
      form.style.display="none";
      setTimeout(function(){location.href="/";},1600);
    })
    .catch(function(err){
